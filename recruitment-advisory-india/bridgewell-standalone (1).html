document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Libre Caslon Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"bd37224d-e69e-42cc-bec3-504f351fc78c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Libre Caslon Display';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"3ea4e96f-7122-4373-843d-e5abfa618e50\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n/* ═══════════════════════════════════════════════════\n   BRIDGEWELL ADVISORY — Design System v4\n   Libre Caslon Display + Inter\n   Forest #1B3E2C | Stone #C0A27C | Dark #0C0C0A\n═══════════════════════════════════════════════════ */\n\n:root {\n  --canvas:    #F7F5F0;\n  --canvas-2:  #EFECE5;\n  --canvas-3:  #E8E4DB;\n  --white:     #FFFFFF;\n  --dark:      #0C0C0A;\n  --dark-2:    #151513;\n  --forest:    #1B3E2C;\n  --forest-2:  #234E38;\n  --forest-3:  #2C6446;\n  --forest-lt: #E6EFE9;\n  --stone:     #C0A27C;\n  --stone-lt:  #D4B898;\n  --ink:       #1A1A16;\n  --ink-2:     #424239;\n  --ink-3:     #747469;\n  --ink-4:     #A8A89C;\n  --border:    rgba(26,26,22,.1);\n  --border-dk: rgba(255,255,255,.12);\n  --radius:    6px;\n  --wa:        #25D366;\n}\n\n*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }\nhtml { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; }\nbody { font-family:'Inter',sans-serif; font-size:15px; line-height:1.65; background:var(--canvas); color:var(--ink); overflow-x:hidden; }\nimg  { max-width:100%; display:block; }\na    { text-decoration:none; color:inherit; transition:color .2s, opacity .2s; }\nstrong { font-weight:600; }\n\n/* ── ACCESSIBILITY ── */\n.skip-link {\n  position:absolute; top:-48px; left:16px;\n  padding:10px 20px; background:var(--forest); color:var(--white);\n  font-size:12px; font-weight:600;\n  border-radius:0 0 var(--radius) var(--radius); z-index:200000;\n  transition:top .2s;\n}\n.skip-link:focus { top:0; outline:3px solid var(--stone); outline-offset:2px; }\n:focus-visible   { outline:2px solid var(--stone); outline-offset:3px; }\n\n/* ─────────────────────────────────\n   TYPE SCALE\n───────────────────────────────── */\n\n/* Hero display — only H1 */\n.t-hero {\n  font-family:'Libre Caslon Display',serif;\n  font-size:clamp(34px, 4.8vw, 62px);\n  font-weight:400;\n  line-height:1.09;\n  letter-spacing:-0.025em;\n  color:var(--white);\n  margin-bottom:40px;\n}\n.t-hero em { font-style:italic; color:var(--stone); }\n\n/* Section heading H2 */\n.t-h2 {\n  font-family:'Libre Caslon Display',serif;\n  font-size:clamp(26px, 3.4vw, 42px);\n  font-weight:400;\n  line-height:1.2;\n  letter-spacing:-0.02em;\n  color:var(--ink);\n  margin-top:10px;     /* gap from eyebrow above */\n  margin-bottom:20px;  /* gap to subtext below */\n}\n.t-h2 em       { font-style:italic; color:var(--forest); }\n.t-h2--wh      { color:var(--white); }\n.t-h2--wh em   { color:var(--stone); }\n\n/* Sub-heading H3 — regional cards */\n.t-h3 {\n  font-family:'Libre Caslon Display',serif;\n  font-size:20px;   /* fixed — not fluid — prevents oversizing in cards */\n  font-weight:400;\n  line-height:1.3;\n  letter-spacing:-0.015em;\n  color:var(--ink);\n  margin-bottom:10px;\n}\n\n/* Card heading — Inter, always readable */\n.t-h4 {\n  font-family:'Inter',sans-serif;\n  font-size:16px;\n  font-weight:600;\n  line-height:1.4;\n  letter-spacing:-0.01em;\n  color:var(--ink);\n}\n.t-h4--wh { color:var(--white); }\n\n/* Eyebrow — displayed block, always above heading */\n.t-eyebrow {\n  display:block;\n  font-family:'Inter',sans-serif;\n  font-size:10px;\n  font-weight:700;\n  letter-spacing:0.22em;\n  text-transform:uppercase;\n  color:var(--ink-4);\n  margin-bottom:10px;\n}\n.t-eyebrow--stone  { color:var(--stone); }\n.t-eyebrow--forest { color:var(--forest); }\n\n/* Body variants */\n.t-lead {\n  font-family:'Inter',sans-serif;\n  font-size:clamp(15px,1.5vw,17px);\n  font-weight:400;\n  line-height:1.72;\n  color:rgba(255,255,255,.8);\n  letter-spacing:-0.01em;\n}\n.t-body {\n  font-family:'Inter',sans-serif;\n  font-size:15px;\n  font-weight:400;\n  line-height:1.7;\n  color:var(--ink-2);\n  letter-spacing:-0.005em;\n}\n.t-body--dk  { color:rgba(255,255,255,.72); }\n.t-body--sm  { font-size:13px; line-height:1.65; color:var(--ink-3); }\n.t-body--sm-dk { color:rgba(255,255,255,.58); }\n\n/* Large numbers */\n.t-stat {\n  font-family:'Libre Caslon Display',serif;\n  font-size:36px;\n  font-weight:400;\n  line-height:1;\n  letter-spacing:-0.02em;\n  color:var(--forest);\n  margin-bottom:12px;\n}\n\n/* Step numbers (approach section) */\n.t-step {\n  font-family:'Libre Caslon Display',serif;\n  font-size:26px;\n  color:rgba(255,255,255,.22);\n  line-height:1;\n  margin-bottom:14px;\n}\n\n/* ─────────────────────────────────\n   LAYOUT\n───────────────────────────────── */\n.wrap {\n  max-width:1160px;\n  margin:0 auto;\n  padding:0 48px;\n}\n\n.sec        { padding:88px 0; background:var(--white); }\n.sec--off   { padding:88px 0; background:var(--canvas-2); }\n.sec--dark  { padding:96px 0; background:var(--dark); position:relative; overflow:hidden; }\n.sec--forest{ padding:88px 0; background:var(--forest); }\n\n/* Section intro: eyebrow + heading + subtext — consistent across all sections */\n.sec-intro { margin-bottom:56px; }\n.sec-intro .t-h2 { max-width:720px; }\n.sec-intro .t-body { max-width:640px; }\n\n/* Two column */\n.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:start; }\n\n/* Three column */\n.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }\n\n/* 2×2 grid (regions) */\n.grid-2x2 {\n  display:grid; grid-template-columns:repeat(2,1fr);\n  gap:1px; background:var(--canvas-3);\n  border:1px solid var(--canvas-3); border-radius:var(--radius); overflow:hidden;\n}\n\n.rule    { border:0; height:1px; background:var(--border); }\n.rule--dk { background:var(--border-dk); }\n\n/* ─────────────────────────────────\n   BUTTONS\n───────────────────────────────── */\n.btn {\n  display:inline-flex; align-items:center; gap:6px;\n  font-family:'Inter',sans-serif; font-size:14px; font-weight:600;\n  line-height:1; padding:14px 26px;\n  border-radius:var(--radius); border:1.5px solid transparent;\n  cursor:pointer; white-space:nowrap; letter-spacing:-0.01em;\n  transition:background .18s, color .18s, border-color .18s, transform .18s;\n}\n.btn:focus-visible { outline:2px solid var(--stone); outline-offset:3px; }\n\n.btn--forest { background:var(--forest); color:var(--white); border-color:var(--forest); }\n.btn--forest:hover { background:var(--forest-2); border-color:var(--forest-2); transform:translateY(-1px); }\n\n.btn--ghost-dk { background:transparent; color:rgba(255,255,255,.82); border-color:rgba(255,255,255,.25); }\n.btn--ghost-dk:hover { border-color:rgba(255,255,255,.5); color:var(--white); }\n\n.btn--white { background:var(--white); color:var(--dark); border-color:var(--white); }\n.btn--white:hover { background:var(--canvas); transform:translateY(-1px); }\n\n/* ─────────────────────────────────\n   HERO\n───────────────────────────────── */\n#hero {\n  background:linear-gradient(150deg, #091510 0%, var(--forest) 100%);\n  padding:130px 0 0;\n  position:relative; overflow:hidden;\n}\n.h-noise {\n  position:absolute; inset:0; pointer-events:none;\n  background-image:url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.06'/%3E%3C/svg%3E\");\n  opacity:.5;\n}\n.h-glow { position:absolute; border-radius:50%; filter:blur(90px); pointer-events:none; }\n.hg1 { width:520px; height:520px; background:var(--stone); opacity:.12; top:-160px; right:-80px; }\n.hg2 { width:380px; height:380px; background:var(--forest-3); opacity:.25; bottom:-60px; left:-60px; }\n.h-inner { position:relative; z-index:1; }\n\n.bc {\n  font-size:11px; color:rgba(255,255,255,.42); letter-spacing:.02em;\n  margin-bottom:28px; display:flex; align-items:center; gap:6px;\n}\n.bc a { color:rgba(255,255,255,.52); }\n.bc a:hover { color:var(--stone); }\n\n.h-qualifier {\n  display:inline-block;\n  font-size:10px; font-weight:700; letter-spacing:.2em; text-transform:uppercase;\n  color:var(--stone); border:1px solid rgba(192,162,124,.32);\n  border-radius:3px; padding:5px 12px; margin-bottom:22px;\n}\n\n/* Hero two-col */\n.h-body {\n  display:grid; grid-template-columns:1fr 360px;\n  gap:64px; align-items:start;\n  padding-bottom:64px;\n}\n.h-btns { display:flex; flex-wrap:wrap; gap:10px; margin-top:28px; }\n\n/* Regional panel */\n.h-panel {\n  background:rgba(255,255,255,.04);\n  border:1px solid rgba(255,255,255,.1);\n  border-radius:var(--radius); overflow:hidden;\n  align-self:center;\n}\n.hp-row {\n  display:flex; justify-content:space-between; align-items:center;\n  padding:16px 20px; gap:16px;\n  border-bottom:1px solid rgba(255,255,255,.07);\n}\n.hp-row:last-child { border-bottom:0; }\n.hp-city  { font-size:12px; font-weight:700; color:var(--stone); letter-spacing:.04em; flex-shrink:0; }\n.hp-label { font-size:11px; color:rgba(255,255,255,.45); text-align:right; line-height:1.4; }\n\n/* Hero bar */\n.h-bar {\n  border-top:1px solid rgba(255,255,255,.09);\n  position:relative; z-index:1;\n}\n.h-bar-inner {\n  display:flex; justify-content:space-between;\n  align-items:center; flex-wrap:wrap;\n  gap:12px; padding:18px 0;\n}\n.h-bar-links { display:flex; gap:28px; flex-wrap:wrap; }\n.h-bar-link { font-size:13px; color:rgba(255,255,255,.58); font-weight:500; }\n.h-bar-link:hover { color:var(--stone); }\n.h-bar-tag { font-size:10px; color:rgba(255,255,255,.32); letter-spacing:.08em; text-transform:uppercase; }\n\n/* ─────────────────────────────────\n   PAGE NAV\n───────────────────────────────── */\n.page-nav {\n  background:var(--white); border-bottom:1px solid var(--border);\n  position:sticky; top:0; z-index:100;\n  overflow-x:auto; scrollbar-width:none;\n}\n.page-nav::-webkit-scrollbar { display:none; }\n.pn-inner {\n  max-width:1160px; margin:0 auto; padding:0 48px;\n  display:flex; gap:28px;\n  width:max-content; min-width:100%;\n}\n.pn-a {\n  font-size:12px; font-weight:600; letter-spacing:.01em;\n  color:var(--ink-3); padding:15px 0; white-space:nowrap;\n  border-bottom:2px solid transparent;\n  transition:color .2s, border-color .2s; display:inline-block;\n}\n.pn-a:hover { color:var(--forest); border-bottom-color:var(--forest); }\n\n/* ─────────────────────────────────\n   CARDS\n───────────────────────────────── */\n.card {\n  background:var(--white); border:1px solid var(--border);\n  border-radius:var(--radius); padding:28px 24px;\n  transition:transform .2s, box-shadow .2s;\n}\n.card:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(27,62,44,.08); }\n\n/* Dark card — for forest background sections */\n.card--dk {\n  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);\n  border-radius:var(--radius); padding:28px 24px;\n  transition:background .2s;\n}\n.card--dk:hover { background:rgba(255,255,255,.09); }\n\n/* ─────────────────────────────────\n   BULLET LISTS\n───────────────────────────────── */\n.blist { display:flex; flex-direction:column; gap:12px; }\n.blist-item {\n  display:flex; align-items:flex-start; gap:12px;\n  font-size:14px; line-height:1.65; color:var(--ink-2);\n}\n.blist-item--dk { color:rgba(255,255,255,.7); }\n.blist-dot { width:5px; height:5px; border-radius:50%; background:var lay:.32s; }\n.d5 { transition-delay:.4s;  }\n\n/* ─────────────────────────────────\n   RESPONSIVE — 1024px\n───────────────────────────────── */\n@media (max-width:1024px) {\n  .wrap { padding:0 28px; }\n  .pn-inner { padding:0 28px; }\n  .h-body { grid-template-columns:1fr; gap:40px; }\n  .h-panel { max-width:480px; }\n  .grid-2 { grid-template-columns:1fr; gap:40px; }\n  .grid-3 { grid-template-columns:1fr 1fr; }\n  .compare { grid-template-columns:1fr; }\n  .fee-row { grid-template-columns:1fr 1fr; }\n  .fee-note { grid-column:1/-1; }\n  .ft-grid { grid-template-columns:1fr 1fr; gap:40px; }\n  .filter-cols { gap:28px; }\n  .cta-steps { grid-template-columns:1fr; gap:24px; }\n}\n\n/* ─────────────────────────────────\n   RESPONSIVE — 768px\n───────────────────────────────── */\n@media (max-width:768px) {\n  .wrap { padding:0 20px; }\n  .pn-inner { padding:0 20px; }\n  #hero { padding-top:80px; }\n  .sec, .sec--off { padding:60px 0; }\n  .sec--dark, .sec--forest { padding:72px 0; }\n  .h-btns { flex-direction:column; }\n  .btn { width:100%; justify-content:center; }\n  .grid-3 { grid-template-columns:1fr; }\n  .grid-2x2 { grid-template-columns:1fr; }\n  .compare { grid-template-columns:1fr; }\n  .fee-row { grid-template-columns:1fr; gap:6px; }\n  .fee-note { display:none; }\n  .ft-grid { grid-template-columns:1fr; gap:32px; }\n  .ft-bot { flex-direction:column; text-align:center; }\n  .filter-cols { grid-template-columns:1fr; gap:28px; }\n  .cta-steps { grid-template-columns:1fr; }\n  .cta-contacts { gap:16px; }\n  .wa-float { bottom:16px; right:16px; width:50px; height:50px; }\n  .wa-float svg { width:22px; height:22px; }\n  .regional-card { padding:28px 24px; }\n}\n\n@media (prefers-reduced-motion:reduce) {\n  .rv { opacity:1; transform:none; transition:none; }\n  .wa-float { animation:none; }\n  * { transition-duration:.01ms !important; }\n}\n\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n\n\n\n<!-- SKIP LINK (Accessibility) -->\n<a href=\"#main-content\" class=\"skip-link\">Skip to main content<\u002Fa>\n\n<header class=\"site-header\">\n  <div class=\"site-header-inner\">\n    <a href=\"/\" class=\"brand\" aria-label=\"Bridgewell Advisory — home\">\n      <span class=\"brand-mark-wrap\" aria-hidden=\"true\">\n        <img class=\"brand-mark\" src=\"91bcba9c-de4e-459a-b931-c8ba06383bd0\" alt=\"\" loading=\"eager\" decoding=\"async\">\n      <\u002Fspan>\n      <div>\n        <div class=\"brand-word\">BridgeWell<\u002Fdiv>\n        <div class=\"brand-tag\">Advisory<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fa>\n    <nav aria-label=\"Primary\">\n      <a href=\"/\">Home<\u002Fa>\n      <a href=\"#approach\">Approach<\u002Fa>\n      <a href=\"#who\">Who it's for<\u002Fa>\n      <a href=\"#cta\" class=\"hdr-cta\">Request a diagnostic<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main id=\"main-content\">\n\n<!-- ══════════════════════════════════════════\n     HERO\n══════════════════════════════════════════ -->\n<section id=\"hero\">\n  <div class=\"h-noise\"><\u002Fdiv>\n  <div class=\"h-glow hg1\"><\u002Fdiv><div class=\"h-glow hg2\"><\u002Fdiv>\n  <div class=\"container h-inner\">\n\n    <nav class=\"bc\" aria-label=\"Breadcrumb\">\n      <a href=\"/\">Home<\u002Fa><span class=\"bc-sep\">›<\u002Fspan>\n      <span aria-current=\"page\">Recruitment Advisory India<\u002Fspan>\n    <\u002Fnav>\n\n    <div class=\"t-eyebrow t-eyebrow--stone\">Recruitment Advisory · India<\u002Fdiv>\n\n    <h1 class=\"t-hero rv visible\">\n      The brief is wrong.<br>The panel is wrong.<br>\n      <em>The hire was decided before it started.<\u002Fem>\n    <\u002Fh1>\n\n    <div class=\"hero-grid\">\n      <div>\n        <div class=\"hero-qualifier\">\n          For founders and CXOs hiring leadership roles (₹40L+)\n        <\u002Fdiv>\n        \n        <p class=\"t-lead\">\n          Bridgewell Advisory is a <strong style=\"color:rgba(255,255,255,.82);\">recruitment advisory firm<\u002Fstrong> for founders and CXOs across India. We work on <strong style=\"color:rgba(255,255,255,.82);\">leadership hiring<\u002Fstrong> and <strong style=\"color:rgba(255,255,255,.82);\">critical roles<\u002Fstrong> in Bangalore, Coimbatore, Chennai, Kerala, Mumbai, Delhi NCR, and Noida. Strategic hiring partner, not a placement agency.\n        <\u002Fp>\n        \n        <div class=\"hero-btns\" style=\"font-size: 1px\">\n          <a href=\"https://tally.so/r/rjdAGo\" target=\"_blank\" rel=\"noopener\" class=\"btn btn--forest\" aria-label=\"Request a hiring diagnostic consultation\">Request a Hiring Diagnostic →<\u002Fa>\n          <a href=\"https://wa.me/917904411277?text=I%27d%20like%20to%20discuss%20a%20leadership%20hiring%20mandate%20with%20Bridgewell.\" target=\"_blank\" rel=\"noopener\" class=\"btn btn--ghost-dk\" aria-label=\"Start conversation on WhatsApp\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"margin-right:6px;\"><path d=\"M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.29.173-1.414-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z\"><\u002Fpath><\u002Fsvg>\n            WhatsApp Us\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"hero-panel\">\n        <div class=\"hp-row\"><div class=\"hp-city\">Bangalore<\u002Fdiv><div class=\"hp-l\">Speed vs. quality trade-off<\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-row\"><div class=\"hp-city\">Chennai<\u002Fdiv><div class=\"hp-l\">Execution depth, leadership gap<\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-row\"><div class=\"hp-city\">Kerala<\u002Fdiv><div class=\"hp-l\">Talent pool, alignment problem<\u002Fdiv><\u002Fdiv>\n        <div class=\"hp-row\"><div class=\"hp-city\">Delhi NCR<\u002Fdiv><div class=\"hp-l\">High noise, variable depth<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n  <div class=\"h-bar\"><div class=\"wrap\">\n    <div class=\"h-bar-inner\"><div class=\"h-bar-links\">\n      <a href=\"tel:+917904411277\" class=\"h-bar-link\" aria-label=\"Call Bridgewell Advisory\">+91 79044 11277<\u002Fa>\n      <a href=\"mailto:Zaira.s@bridgewell-advisory.in\" class=\"h-bar-link\">Zaira.s@bridgewell-advisory.in<\u002Fa>\n    <\u002Fdiv>\n    <span class=\"h-bar-tag\">Strategic Partner · Not a Recruitment Agency<\u002Fspan>\n  <\u002Fdiv><\u002Fdiv>\n<\u002Fdiv><\u002Fsection>\n\n<!-- PAGE NAV -->\n<nav class=\"page-nav\" aria-label=\"Page sections\">\n  <div class=\"pn-inner\">\n    <a href=\"#wrong\" class=\"pn-a\">What Goes Wrong<\u002Fa>\n    <a href=\"#advisory-vs-agency\" class=\"pn-a\">Advisory vs. Agency<\u002Fa>\n    <a href=\"#regional-context\" class=\"pn-a\">Regional Context<\u002Fa>\n    <a href=\"#why-fail\" class=\"pn-a\">Why Partners Fail<\u002Fa>\n    <a href=\"#approach\" class=\"pn-a\">Our Approach<\u002Fa>\n    <a href=\"#who\" class=\"pn-a\">Decision Filter<\u002Fa>\n    <a href=\"#cta\" class=\"pn-a\">Start a Conversation<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n\n<!-- ══════════════════════════════════════════\n     01 - WHAT GOES WRONG\n══════════════════════════════════════════ -->\n<section id=\"wrong\" class=\"sec\">\n  <div class=\"container\">\n    <div class=\"grid-2 rv visible\">\n      <div>\n        <div class=\"t-eyebrow\">The Root Problem<\u002Fdiv>\n        <h2 class=\"h2\">Most companies don't have a talent problem.<br><em>They have a decision problem.<\u002Fem><\u002Fh2>\n        <p class=\"t-body\" style=\"margin-top:18px\">The failure happens before the first CV is reviewed. The brief is misaligned, the evaluation criteria are wrong, or the wrong stakeholders are making the call. Leadership hiring fails because of <strong>process failure<\u002Fstrong>, not talent scarcity.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p class=\"t-eyebrow rv d1 visible\">Where hiring decisions break down<\u002Fp>\n        <div class=\"blist rv d2 visible\">\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv><strong>Wrong brief.<\u002Fstrong> The JD describes the role as it existed, not as it needs to evolve. Every CV looks wrong because the spec is wrong.<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv><strong>Wrong evaluation signals.<\u002Fstrong> Brand names, degrees, confident presentation: none predict performance in your context.<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv><strong>Wrong decision-makers.<\u002Fstrong> Panels avoid conflict and pick the least objectionable option. Single managers hire people like themselves.<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv><strong>Wrong timeline.<\u002Fstrong> Urgency compresses process. Compressed process privileges available candidates over the right ones.<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv><strong>No post-hire accountability.<\u002Fstrong> The recruitment partner disappears at offer acceptance. The real test begins after that.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HIRING FAILURE SCENARIO -->\n    <div class=\"failure-scenario rv d3 visible\">\n      <div style=\"font-size:10px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--forest);margin-bottom:12px;\">Actual Hiring Failure Pattern<\u002Fdiv>\n      <p class=\"t-body\"><strong>Series B SaaS company, Bangalore.<\u002Fstrong> Hired VP Engineering from a unicorn. Strong pedigree, solid interviews. 8 months in: zero shipped features, team attrition at 40%, ₹2.8Cr in runway burned. The problem: candidate was evaluated on past employer brand, not their ability to build without that infrastructure. The brief never tested for resource-constrained execution. Timeline: 18 months to recover (new hire + team rebuild).<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"grid-3 rv d4 visible\" style=\"margin-top:48px;\">\n      <div class=\"card\">\n        <div class=\"card-n\">₹1.2-3.6Cr<\u002Fdiv>\n        <h3 class=\"t-h4\" style=\"margin-bottom:8px;\">Cost of a failed VP hire<\u002Fh3>\n        <p class=\"t-body--sm\">Conservative total cost (salary + team impact + opportunity cost) for a wrong leadership hire at ₹40L CTC.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-n\">68%<\u002Fdiv>\n        <h3 class=\"t-h4\" style=\"margin-bottom:8px;\">Underperform in year one<\u002Fh3>\n        <p class=\"t-body--sm\">Share of leadership hires that fail to deliver against their original role brief within 12 months.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-n\">18 mo.<\u002Fdiv>\n        <h3 class=\"t-h4\" style=\"margin-bottom:8px;\">Recovery timeline<\u002Fh3>\n        <p class=\"t-body--sm\">Average time from recognizing failure to full productivity with replacement hire.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- ══════════════════════════════════════════\n     02 - ADVISORY VS AGENCY\n══════════════════════════════════════════ -->\n<section id=\"advisory-vs-agency\" class=\"sec--off\">\n  <div class=\"container\">\n    <div class=\"t-eyebrow rv visible\">The Distinction<\u002Fdiv>\n    <h2 class=\"t-h2 rv d1 visible\">Recruitment advisory is not recruitment<br><em>with a different name.<\u002Fem><\u002Fh2>\n    <p class=\"t-body rv d2 visible\">The distinction is structural. It determines whose interests are served when the hiring decision is made.<\u002Fp>\n\n    <div class=\"compare rv d3 visible\">\n      <div class=\"cmp-col cmp-bad-rows\">\n        <div class=\"cmp-head cmp-bad\">Recruitment Agency Model<\u002Fdiv>\n        <div class=\"cmp-row\">No diagnostic. Activated by a JD.<\u002Fdiv>\n        <div class=\"cmp-row\">Contingency fee. Incentivised to place fast.<\u002Fdiv>\n        <div class=\"cmp-row\">Success = offer acceptance, not hire performance<\u002Fdiv>\n        <div class=\"cmp-row\">10-15 CVs. No recommendation. No advisory view.<\u002Fdiv>\n        <div class=\"cmp-row\">Brief accepted as given, never challenged<\u002Fdiv>\n        <div class=\"cmp-row\">Junior consultant after the pitch<\u002Fdiv>\n        <div class=\"cmp-row\">Zero post-hire accountability<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cmp-col cmp-good-rows\">\n        <div class=\"cmp-head cmp-good\">Advisory Model (Bridgewell)<\u002Fdiv>\n        <div class=\"cmp-row\">Stakeholder diagnostic before search<\u002Fdiv>\n        <div class=\"cmp-row\">Retained fee. Outcome-aligned.<\u002Fdiv>\n        <div class=\"cmp-row\">Success defined by role scorecard (agreed upfront)<\u002Fdiv>\n        <div class=\"cmp-row\">3-5 assessed candidates + written recommendation<\u002Fdiv>\n        <div class=\"cmp-row\">Brief challenged when wrong. That's the value.<\u002Fdiv>\n        <div class=\"cmp-row\">Named senior partner, start to close<\u002Fdiv>\n        <div class=\"cmp-row\">30-60-90 day post-placement advisory included<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- ══════════════════════════════════════════\n     03 - REGIONAL CONTEXT (COMPRESSED)\n══════════════════════════════════════════ -->\n<section id=\"regional-context\" class=\"sec\">\n  <div class=\"container\">\n    <div class=\"t-eyebrow rv visible\">Regional Hiring Context<\u002Fdiv>\n    <h2 class=\"t-h2 rv d1 visible\">\n      Regional variation is real.<br>\n      <em>The root cause is the same.<\u002Fem>\n    <\u002Fh2>\n    <p class=\"t-body rv d2 visible\">\n      Hiring failure patterns vary by market, but the structural problem remains consistent: speed pressure, wrong evaluation signals, and absent stakeholder alignment. Here's what we see in each major market.\n    <\u002Fp>\n\n    <div class=\"grid-2x2 rv d2 visible\">\n      \n      <!-- BANGALORE -->\n      <div class=\"regional-card\" style=\"background:var(--white);\">\n        <div class=\"rtag\" style=\"margin-bottom:12px;\">Bangalore · Karnataka<\u002Fdiv>\n        <h3 class=\"t-h3\" style=\"margin-bottom:12px;\">Speed vs. quality<\u002Fh3>\n        <p class=\"t-body--sm\" style=\"margin-bottom:16px;\">Urgency-driven shortlisting privileges available candidates over the right ones. Brand-name bias (Swiggy, Flipkart, Razorpay) without testing if the experience transfers.<\u002Fp>\n        <div class=\"insight\">\n          <div class=\"insight-lbl\">Failure Pattern<\u002Fdiv>\n          <p class=\"insight-p\">Speed pressure → premature shortlisting → underqualified hire → back at start in 90 days with weaker position.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CHENNAI -->\n      <div class=\"regional-card\" style=\"background:var(--canvas-2);\">\n        <div class=\"rtag\" style=\"margin-bottom:12px;\">Chennai · Tamil Nadu<\u002Fdiv>\n        <h3 class=\"t-h3\" style=\"margin-bottom:12px;\">Execution depth, leadership gap<\u002Fh3>\n        <p class=\"t-body--sm\" style=\"margin-bottom:16px;\">Strong operational talent, culture-driven organizations. External leadership hires fail when the organization isn't prepared to receive change. The problem precedes the search.<\u002Fp>\n        <div class=\"insight\">\n          <div class=\"insight-lbl\">Failure Pattern<\u002Fdiv>\n          <p class=\"insight-p\">Recruiting for transformation without internal readiness. 12-18 month exit cycle attributed to \"culture fit.\"<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- KERALA -->\n      <div class=\"regional-card\" style=\"background:var(--canvas-2);\">\n        <div class=\"rtag\" style=\"margin-bottom:12px;\">Kerala<\u002Fdiv>\n        <h3 class=\"t-h3\" style=\"margin-bottom:12px;\">Talent pool, alignment problem<\u002Fh3>\n        <p class=\"t-body--sm\" style=\"margin-bottom:16px;\">Experienced professionals returning from Gulf markets with corporate playbooks calibrated for different environments. Contextual adaptability is rarely tested.<\u002Fp>\n        <div class=\"insight\">\n          <div class=\"insight-lbl\">Failure Pattern<\u002Fdiv>\n          <p class=\"insight-p\">Gulf returnee or metro hire evaluated on credentials, not context fit. Fails within 12 months.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DELHI NCR -->\n      <div class=\"regional-card\" style=\"background:var(--white);\">\n        <div class=\"rtag\" style=\"margin-bottom:12px;\">Delhi NCR · Noida · Delhi<\u002Fdiv>\n        <h3 class=\"t-h3\" style=\"margin-bottom:12px;\">Noise, not depth<\u002Fh3>\n        <p class=\"t-body--sm\" style=\"margin-bottom:16px;\">India's largest hiring market outside Mumbai. Most fragmented. Title inflation, relationship-driven placements, and candidates who held authority vs. exercised it.<\u002Fp>\n        <div class=\"insight\">\n          <div class=\"insight-lbl\">Failure Pattern<\u002Fdiv>\n          <p class=\"insight-p\">Hired for title and brand. Deploys processes, not outcomes. Company waits too long to act. 12 months lost.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- ══════════════════════════════════════════\n     04 - WHY PARTNERS FAIL\n══════════════════════════════════════════ -->\n<section id=\"why-fail\" class=\"sec\">\n  <div class=\"container\">\n    <div class=\"t-eyebrow rv visible\">The Agency Problem<\u002Fdiv>\n    <h2 class=\"t-h2 rv d1 visible\">Most recruitment partners optimise for placement speed.<br><em>Not decision quality.<\u002Fem><\u002Fh2>\n    <p class=\"t-body rv d2 visible\">The contingency model creates a structural misalignment. Agencies win when they place fast, not when you hire right. This determines behavior at every step.<\u002Fp>\n\n    <div class=\"grid-3 rv d3 visible\" style=\"margin-top:48px;\">\n      <div class=\"card\">\n        <h3 class=\"t-h4\" style=\"margin-bottom:10px;\">No diagnostic phase<\u002Fh3>\n        <p class=\"t-body--sm\">Search begins the day the JD arrives. The brief is never challenged. The role definition is never tested. Six months later, the hire fails because the brief was wrong.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h3 class=\"t-h4\" style=\"margin-bottom:10px;\">Volume over fit<\u002Fh3>\n        <p class=\"t-body--sm\">10-15 CVs with no recommendation. You filter. You evaluate fit. The agency optimised for speed, not accuracy. The decision risk sits with you.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h3 class=\"t-h4\" style=\"margin-bottom:10px;\">Exit at offer acceptance<\u002Fh3>\n        <p class=\"t-body--sm\">Success = signed offer. The agency disappears. 30-60-90 day performance, onboarding support, stakeholder alignment: all left to you.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- ══════════════════════════════════════════\n     05 - OUR APPROACH\n══════════════════════════════════════════ -->\n<section id=\"approach\" class=\"sec--forest\">\n  <div class=\"container\">\n    <div class=\"t-eyebrow t-eyebrow--stone rv visible\">How We Work<\u002Fdiv>\n    <h2 class=\"t-h2 t-h2--wh rv d1 visible\">Diagnostic first.<br><em>Search second.<\u002Fem><br>Accountable throughout.<\u002Fh2>\n    <p class=\"t-body t-body--dk rv d2 visible\">Every mandate begins with stakeholder alignment. We rebuild the brief when it's wrong. We challenge the timeline when it's compressed. The search begins only after the decision framework is clear.<\u002Fp>\n\n    <div class=\"grid-3 rv d3 visible\" style=\"margin-top:48px;\">\n      <div class=\"card--dk\" style=\"border-style: double; background-color: rgb(40, 73, 56)\">\n        <div class=\"t-step\">01<\u002Fdiv>\n        <h3 class=\"t-h4 t-h4--wh\" style=\"margin-bottom:10px;\">Stakeholder diagnostic<\u002Fh3>\n        <p class=\"t-body--sm t-body--sm-dk\" style=\"color: rgb(192, 162, 124)\">Who decides? What are they optimising for? Where is the misalignment? We map this before the search begins.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card--dk\" style=\"border-style: double; background-color: rgb(40, 73, 56)\">\n        <div class=\"t-step\">02<\u002Fdiv>\n        <h3 class=\"t-h4 t-h4--wh\" style=\"margin-bottom:10px;\">Brief challenge<\u002Fh3>\n        <p class=\"t-body--sm t-body--sm-dk\" style=\"color: rgb(192, 162, 124)\">Role clarity, seniority calibration, success metrics, compensation benchmarking. Most briefs change at this stage.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card--dk\" style=\"border-style: double; background-color: rgb(40, 73, 56)\">\n        <div class=\"t-step\">03<\u002Fdiv>\n        <h3 class=\"t-h4 t-h4--wh\" style=\"margin-bottom:10px;\">Scorecard design<\u002Fh3>\n        <p class=\"t-body--sm t-body--sm-dk\" style=\"color: rgb(192, 162, 124)\">What does good look like in 90 days? What competencies matter? How do we test for them? Agreed before search.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card--dk\" style=\"border-style: double; background-color: rgb(40, 73, 56)\">\n        <div class=\"t-step\">04<\u002Fdiv>\n        <h3 class=\"t-h4 t-h4--wh\" style=\"margin-bottom:10px;\">Assessed shortlist<\u002Fh3>\n        <p class=\"t-body--sm t-body--sm-dk\" style=\"color: rgb(192, 162, 124)\">3-5 candidates. Each tested against the scorecard. Written recommendation with reasoning. Not a ranked list, a decision brief.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card--dk\" style=\"border-style: double; background-color: rgb(40, 73, 56)\">\n        <div class=\"t-step\">05<\u002Fdiv>\n        <h3 class=\"t-h4 t-h4--wh\" style=\"margin-bottom:10px;\">Offer design<\u002Fh3>\n        <p class=\"t-body--sm t-body--sm-dk\" style=\"color: rgb(192, 162, 124)\">Compensation structure, equity, role scope, reporting lines. We support the negotiation, not just connect you.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"card--dk\" style=\"border-style: double; background-color: rgb(40, 73, 56)\">\n        <div class=\"t-step\">06<\u002Fdiv>\n        <h3 class=\"t-h4 t-h4--wh\" style=\"margin-bottom:10px;\">Post-placement advisory<\u002Fh3>\n        <p class=\"t-body--sm t-body--sm-dk\" style=\"color: rgb(192, 162, 124)\">30-60-90 day check-ins included. Onboarding support, stakeholder feedback, early warning signals. Accountability continues.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule rule--dk\">\n\n<!-- ══════════════════════════════════════════\n     06 - DECISION FILTER (WHO THIS IS FOR)\n══════════════════════════════════════════ -->\n<section id=\"who\" class=\"sec\">\n  <div class=\"container\">\n\n    <!-- Intro band: image + heading split -->\n    <div class=\"who-intro rv visible\" style=\"\n      display: grid; grid-template-columns: 1fr 1fr; gap: 48px;\n      align-items: center; margin-bottom: 72px;\n    \">\n      <figure style=\"margin: 0; position: relative;\">\n        <div style=\"\n          position: relative; overflow: hidden;\n          border-radius: var(--radius);\n          background: #eef2ee;\n          aspect-ratio: 4 / 3;\n          box-shadow:\n            0 1px 0 rgba(255,255,255,.6) inset,\n            0 1px 3px rgba(20,35,25,.06),\n            0 14px 32px -12px rgba(20,35,25,.18);\n        \">\n          <img src=\"0b5f8f67-eca1-4bb1-b390-42632a4ae9b4\" alt=\"Hands presenting candidate resumes through a monitor\" loading=\"lazy\" decoding=\"async\" style=\"\n              display: block; width: 100%; height: 100%;\n              object-fit: cover; object-position: center;\n            \">\n        <\u002Fdiv>\n        <figcaption style=\"\n          margin-top: 10px; font-size: 10px; color: var(--ink-3);\n          letter-spacing: .1em; text-transform: uppercase;\n          font-family: 'Inter', sans-serif;\n        \">\n\n        <\u002Ffigcaption>\n      <\u002Ffigure>\n\n      <div>\n        <div class=\"t-eyebrow\">Decision Filter<\u002Fdiv>\n        <h2 class=\"t-h2\" style=\"margin-top: 12px;\">\n          This is not for everyone.<br>\n          <em>It is not designed to be.<\u002Fem>\n        <\u002Fh2>\n        <p class=\"t-body\" style=\"margin-top: 18px;\">\n          We work exclusively with founders and CXOs hiring leadership or critical roles (₹10L+ CTC). If your hiring challenge fits one of the patterns below, we're likely a fit. If not, we'll tell you in the first conversation.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rv d2 visible\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 48px;\">\n      <div>\n        <p class=\"t-eyebrow\" style=\"margin-bottom: 8px; color: rgb(15, 119, 40)\">This IS for you if<\u002Fp>\n        <div class=\"blist\">\n          <div class=\"blist-item\"><div class=\"blist-dot\"><\u002Fdiv>You're hiring a leadership role (VP+, Head of, CXO)<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot\"><\u002Fdiv>You've already seen 1-2 wrong hires in this function<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot\"><\u002Fdiv>You want decision quality, not placement speed<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot\"><\u002Fdiv>You're willing to challenge your own brief<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <p class=\"t-eyebrow\" style=\"margin-bottom: 8px; color: rgb(228, 15, 68)\">This is NOT for you if<\u002Fp>\n        <div class=\"blist\">\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv>You need CVs in the next 7 days<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv>You're comparing 3+ agencies on price<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv>You want 15 CVs to \"see the market\"<\u002Fdiv>\n          <div class=\"blist-item\"><div class=\"blist-dot blist-dot--red\"><\u002Fdiv>The fee is your primary decision factor<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FEE TRANSPARENCY -->\n    <div class=\"rv d3 visible\" style=\"margin-top:64px;\">\n      <div class=\"t-eyebrow\" style=\"margin-bottom:16px;\">Engagement Fees<\u002Fdiv>\n      <div class=\"fee-table\">\n        <div class=\"fee-row\">\n          <div class=\"fee-role\">Mid-level leadership (Manager, Lead, Senior Manager) &amp; Critical Roles<\u002Fdiv>\n          <div class=\"fee-amt\">₹2L-₹8L<\u002Fdiv>\n          <div class=\"fee-note\">50% upfront, 50% at shortlist delivery. 30-day post-placement check-in included.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fee-row\">\n          <div class=\"fee-role\">Senior leadership (VP, Head of, Director)<\u002Fdiv>\n          <div class=\"fee-amt\">₹10L-₹18L<\u002Fdiv>\n          <div class=\"fee-note\">50% upfront, 50% at shortlist delivery. 60-day post-placement advisory included.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"fee-row\">\n          <div class=\"fee-role\">CXO level (CFO, CTO, COO, CPO)<\u002Fdiv>\n          <div class=\"fee-amt\">₹20L-₹25L<\u002Fdiv>\n          <div class=\"fee-note\">Retained fee. Staged payments. 90-day post-placement advisory and stakeholder alignment work included.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"t-body--sm\" style=\"margin-top:20px;color:var(--ink-3);\">All fees are retained. No contingency. No success fee beyond the agreed engagement amount. If the mandate fails because the brief was wrong and we didn't catch it, we refund the second half.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<hr class=\"rule\">\n\n<!-- ══════════════════════════════════════════\n     07 - CTA\n══════════════════════════════════════════ -->\n<section id=\"cta\" class=\"sec--dark\">\n  <div class=\"cta-n\"><\u002Fdiv><div class=\"cta-bg-g\"><\u002Fdiv>\n  <div class=\"cta-inner\">\n    <div class=\"t-eyebrow t-eyebrow--stone\">Limited Mandates. Advisory-First.<\u002Fdiv>\n    <h2 class=\"t-h2 t-h2--wh rv visible\" style=\"margin-bottom:18px;\">\n      Before you make a critical hire,<br>\n      <em>request a hiring diagnostic.<\u002Fem>\n    <\u002Fh2>\n    <p class=\"t-body t-body--dk rv d1 visible\" style=\"margin-bottom:32px\">\n      A 45-minute conversation with a named partner determines whether we're the right fit for your mandate. No pitch deck. No pressure. A direct conversation about your hiring challenge and an honest view on whether Bridgewell's advisory model aligns with what you need.\n    <\u002Fp>\n    \n    <!-- WHAT HAPPENS NEXT -->\n    <div class=\"cta-steps rv d2 visible\">\n        <div>\n          <div style=\"font-size:24px;font-weight:700;color:var(--stone);margin-bottom:8px;\">01<\u002Fdiv>\n          <h4 class=\"h5\" style=\"color:var(--white);margin-bottom:6px;\">Diagnostic call<\u002Fh4>\n          <p class=\"t-body--sm\" style=\"color:rgba(255,255,255,.65);\">We understand the role, the business context, and the decision you're trying to make.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:24px;font-weight:700;color:var(--stone);margin-bottom:8px;\">02<\u002Fdiv>\n          <h4 class=\"h5\" style=\"color:var(--white);margin-bottom:6px;\">Brief challenge<\u002Fh4>\n          <p class=\"t-body--sm\" style=\"color:rgba(255,255,255,.65);\">We tell you if the brief is wrong, and why. Most mandates shift at this stage.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:24px;font-weight:700;color:var(--stone);margin-bottom:8px;\">03<\u002Fdiv>\n          <h4 class=\"h5\" style=\"color:var(--white);margin-bottom:6px;\">Go/no-go<\u002Fh4>\n          <p class=\"t-body--sm\" style=\"color:rgba(255,255,255,.65);\">You leave with clarity, whether we work together or not. Every call delivers value.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    \n    <div class=\"cta-btns rv d3 visible\">\n      <a href=\"https://tally.so/r/rjdAGo\" target=\"_blank\" rel=\"noopener\" class=\"btn btn--white\" aria-label=\"Request a hiring diagnostic with Bridgewell Advisory\">Request a Hiring Diagnostic →<\u002Fa>\n      <a href=\"https://wa.me/917904411277?text=I%27d%20like%20to%20discuss%20a%20leadership%20hiring%20mandate%20with%20Bridgewell.\" target=\"_blank\" rel=\"noopener\" class=\"btn btn--ghost-dk\" aria-label=\"Start conversation on WhatsApp\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"margin-right:6px;\"><path d=\"M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.
